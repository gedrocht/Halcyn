[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = [
  "B",
  "E",
  "F",
  "I",
  "N",
  "UP",
]

[tool.coverage.run]
branch = true
source = ["control_plane"]

[tool.coverage.report]
show_missing = true
skip_covered = false

[tool.mypy]
python_version = "3.10"
files = ["control_plane"]
check_untyped_defs = true
warn_redundant_casts = true
warn_unused_ignores = true
warn_unreachable = true
pretty = true
