name: Package

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  package-windows:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Python dependencies
        shell: pwsh
        run: python -m pip install --upgrade pip jinja2

      - name: Build package
        shell: pwsh
        run: ./scripts/package.ps1 -Configuration Release -VersionLabel "${{ github.ref_name }}"

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: halcyn-package
          path: artifacts/*.zip
          if-no-files-found: error
