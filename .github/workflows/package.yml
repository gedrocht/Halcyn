name: Package

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: package-${{ github.ref }}
  cancel-in-progress: true

jobs:
  package-windows:
    runs-on: windows-latest
    timeout-minutes: 30
    env:
      HALCYN_CMAKE_GENERATOR: Visual Studio 17 2022

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: "pip"
          cache-dependency-path: pyproject.toml

      - name: Install Python dependencies
        shell: pwsh
        run: python -m pip install --upgrade pip jinja2

      - name: Run release tests
        shell: pwsh
        run: ./scripts/test.ps1 -Configuration Release

      - name: Build package
        shell: pwsh
        run: ./scripts/package.ps1 -Configuration Release -VersionLabel "${{ github.ref_name }}" -SkipBuild

      - name: Upload package artifact
        uses: actions/upload-artifact@v6
        with:
          name: halcyn-package
          path: |
            artifacts/*.zip
            artifacts/*.sha256
          if-no-files-found: error

      - name: Publish GitHub release assets
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ github.ref_name }}"
          $repo = "${{ github.repository }}"
          $assets = @(
            Get-ChildItem artifacts -File |
              Where-Object { $_.Extension -in '.zip', '.sha256' } |
              Select-Object -ExpandProperty FullName
          )
          if ($assets.Count -eq 0) {
            throw 'No release assets were produced under artifacts/.'
          }
          gh release view $tag --repo $repo *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag @assets --generate-notes --title $tag --repo $repo
          }
          else {
            gh release upload $tag @assets --clobber --repo $repo
          }
