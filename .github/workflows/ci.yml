      - name: Type-check desktop render control panel
        shell: pwsh
        run: ./scripts/typecheck-desktop-render-control-panel.ps1

      - name: Measure desktop render control panel coverage
        shell: pwsh
        run: ./scripts/measure-desktop-render-control-panel-coverage.ps1

      - name: Upload desktop render control panel coverage artifact
        uses: actions/upload-artifact@v6
        with:
          name: desktop-render-control-panel-coverage
          path: coverage-desktop-render-control-panel.xml
          if-no-files-found: error

