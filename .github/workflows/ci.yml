          path: coverage-desktop-multi-renderer-data-source-panel.xml
          if-no-files-found: error

  native-debug:
    runs-on: windows-latest
    timeout-minutes: 25
    env:
      HALCYN_CMAKE_GENERATOR: Visual Studio 17 2022

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: "pip"
          cache-dependency-path: pyproject.toml

      - name: Install Python dependencies
        shell: pwsh
        run: python -m pip install --upgrade pip jinja2

      - name: Show prerequisite report
        shell: pwsh
        run: ./scripts/report-prerequisites.ps1

      - name: Verify formatting
        shell: pwsh
        run: ./scripts/verify-cpp-formatting.ps1

      - name: Build and run native tests
        shell: pwsh
        run: ./scripts/run-native-tests.ps1 -Configuration Debug

  native-release:
    runs-on: windows-latest
    timeout-minutes: 25
    env:
      HALCYN_CMAKE_GENERATOR: Visual Studio 17 2022

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: "pip"
          cache-dependency-path: pyproject.toml

      - name: Install Python dependencies
        shell: pwsh
        run: python -m pip install --upgrade pip jinja2

      - name: Build and run native tests (Release)
        shell: pwsh
        run: ./scripts/run-native-tests.ps1 -Configuration Release

  docs-build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install Doxygen
        run: sudo apt-get update && sudo apt-get install -y doxygen

      - name: Generate code docs
        run: doxygen Doxyfile
