      - name: Install Python dependencies
        shell: pwsh
        run: python -m pip install --upgrade pip "coverage[toml]" jinja2 mypy ruff

      - name: Lint desktop multi-renderer data source panel
        shell: pwsh
        run: ./scripts/lint-desktop-multi-renderer-data-source-panel.ps1

      - name: Type-check desktop multi-renderer data source panel
        shell: pwsh
        run: ./scripts/typecheck-desktop-multi-renderer-data-source-panel.ps1

      - name: Measure desktop multi-renderer data source panel coverage
        shell: pwsh
