name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  control-plane-tests:
    runs-on: windows-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Python dependencies
        shell: pwsh
        run: python -m pip install --upgrade pip "coverage[toml]" jinja2 ruff

      - name: Lint control plane
        shell: pwsh
        run: ./scripts/lint-control-plane.ps1

      - name: Run control-plane coverage
        shell: pwsh
        run: ./scripts/coverage-control-plane.ps1

      - name: Upload control-plane coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: control-plane-coverage
          path: coverage-control-plane.xml
          if-no-files-found: error

  native-debug:
    runs-on: windows-latest
    timeout-minutes: 25
    env:
      HALCYN_CMAKE_GENERATOR: Visual Studio 17 2022

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Python dependencies
        shell: pwsh
        run: python -m pip install --upgrade pip jinja2

      - name: Show prerequisite report
        shell: pwsh
        run: ./scripts/bootstrap.ps1

      - name: Verify formatting
        shell: pwsh
        run: ./scripts/verify-format.ps1

      - name: Build and run native tests
        shell: pwsh
        run: ./scripts/test.ps1 -Configuration Debug
