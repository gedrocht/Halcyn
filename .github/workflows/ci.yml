name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  browser-control-center-tests:
    runs-on: windows-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: "pip"
          cache-dependency-path: pyproject.toml

      - name: Install Python dependencies
        shell: pwsh
        run: python -m pip install --upgrade pip "coverage[toml]" jinja2 mypy ruff

      - name: Lint browser Control Center
        shell: pwsh
        run: ./scripts/lint-browser-control-center.ps1

      - name: Type-check browser Control Center
        shell: pwsh
        run: ./scripts/typecheck-browser-control-center.ps1

      - name: Measure browser Control Center coverage
        shell: pwsh
        run: ./scripts/measure-browser-control-center-coverage.ps1

      - name: Upload browser Control Center coverage artifact
        uses: actions/upload-artifact@v6
        with:
          name: browser-control-center-coverage
          path: coverage-browser-control-center.xml
          if-no-files-found: error

  visualizer-studio-tests:
    runs-on: windows-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: "pip"
          cache-dependency-path: pyproject.toml

      - name: Install Python dependencies
        shell: pwsh
        run: python -m pip install --upgrade pip "coverage[toml]" jinja2 mypy ruff ttkbootstrap

      - name: Lint Visualizer Studio
        shell: pwsh
        run: ./scripts/lint-visualizer-studio.ps1

      - name: Type-check Visualizer Studio
        shell: pwsh
        run: ./scripts/typecheck-visualizer-studio.ps1

      - name: Measure Visualizer Studio coverage
        shell: pwsh
        run: ./scripts/measure-visualizer-studio-coverage.ps1

      - name: Upload Visualizer Studio coverage artifact
        uses: actions/upload-artifact@v6
        with:
          name: visualizer-studio-coverage
          path: coverage-visualizer-studio.xml
          if-no-files-found: error

  native-debug:
    runs-on: windows-latest
    timeout-minutes: 25
    env:
      HALCYN_CMAKE_GENERATOR: Visual Studio 17 2022

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: "pip"
          cache-dependency-path: pyproject.toml

      - name: Install Python dependencies
        shell: pwsh
        run: python -m pip install --upgrade pip jinja2

      - name: Show prerequisite report
        shell: pwsh
        run: ./scripts/report-prerequisites.ps1

      - name: Verify formatting
        shell: pwsh
        run: ./scripts/verify-cpp-formatting.ps1

      - name: Build and run native tests
        shell: pwsh
        run: ./scripts/run-native-tests.ps1 -Configuration Debug

  native-release:
    runs-on: windows-latest
    timeout-minutes: 25
    env:
      HALCYN_CMAKE_GENERATOR: Visual Studio 17 2022

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: "pip"
          cache-dependency-path: pyproject.toml

      - name: Install Python dependencies
        shell: pwsh
        run: python -m pip install --upgrade pip jinja2

      - name: Build and run native tests (Release)
        shell: pwsh
        run: ./scripts/run-native-tests.ps1 -Configuration Release

  docs-build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install Doxygen
        run: sudo apt-get update && sudo apt-get install -y doxygen

      - name: Install wiki build dependencies
        run: python -m pip install --upgrade pip mkdocs pymdown-extensions

      - name: Generate code docs
        run: doxygen Doxyfile

      - name: Build beginner walkthrough wiki
        run: python -m mkdocs build --strict -f mkdocs-wiki.yml
