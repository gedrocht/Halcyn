name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  browser-control-center-tests:
    runs-on: windows-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: "pip"
          cache-dependency-path: pyproject.toml

      - name: Install Python dependencies
        shell: pwsh
        run: python -m pip install --upgrade pip "coverage[toml]" jinja2 mypy ruff

      - name: Lint browser Control Center
        shell: pwsh
        run: ./scripts/lint-browser-control-center.ps1

      - name: Type-check browser Control Center
        shell: pwsh
        run: ./scripts/typecheck-browser-control-center.ps1

      - name: Measure browser Control Center coverage
        shell: pwsh
        run: ./scripts/measure-browser-control-center-coverage.ps1

      - name: Upload browser Control Center coverage artifact
        uses: actions/upload-artifact@v6
        with:
          name: browser-control-center-coverage
          path: coverage-browser-control-center.xml
          if-no-files-found: error

  desktop-render-control-panel-tests:
    runs-on: windows-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
